<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Registro Empresa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
      color: #333;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      font-size: 14px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #6366f1;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4f46e5;
    }

    .success {
      text-align: center;
      color: green;
      margin-top: 10px;
    }

    .error {
      text-align: center;
      color: red;
      margin-top: 10px;
    }

    /* 🔐 OVERLAY LOGIN */
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .hidden {
      display: none;
    }
  </style>

</head>
<body>

  <!-- 🔐 LOGIN OVERLAY -->

  <div class="login-overlay" id="loginOverlay">
    <div class="container">
      <h1>Iniciar sesión</h1>

```
  <div class="input-group">
    <label>Correo</label>
    <input type="email" id="correo" required />
  </div>

  <div class="input-group">
    <label>Clave</label>
    <input type="password" id="clave" required />
  </div>

  <button onclick="login()">Ingresar</button>

  <div id="loginMensaje"></div>
</div>
```

  </div>

  <!-- ✅ TU LANDING ORIGINAL (NO TOCADA) -->

  <div class="container">
    <h1>Registrar Empresa</h1>

```
<form id="formulario">
  <div class="input-group">
    <label>País</label>
    <input type="text" name="pais" required />
  </div>

  <div class="input-group">
    <label>ID Empresa</label>
    <input type="text" name="empresa_id" required />
  </div>

  <div class="input-group">
    <label>Nombre Empresa</label>
    <input type="text" name="empresa_nombre" required />
  </div>

  <div class="input-group">
    <label>Logo (PNG)</label>
    <input type="file" name="logo" accept="image/png" required />
  </div>

  <button type="submit">Enviar</button>

  <div id="mensaje"></div>
</form>
```

  </div>

  <script>
    const BACKEND_URL = "http://localhost:3000";

    // 🔐 LOGIN
    async function login() {
      const correo = document.getElementById("correo").value;
      const clave = document.getElementById("clave").value;
      const mensaje = document.getElementById("loginMensaje");

      mensaje.innerHTML = "";

      try {
        const response = await fetch(`${BACKEND_URL}/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ correo, clave })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem("auth", "true");
          document.getElementById("loginOverlay").classList.add("hidden");
        } else {
          mensaje.innerHTML = "<p class='error'>" + data.error + "</p>";
        }

      } catch (error) {
        mensaje.innerHTML = "<p class='error'>Error de conexión</p>";
      }
    }

    // 🔁 Mantener sesión
    window.onload = () => {
      if (localStorage.getItem("auth") === "true") {
        document.getElementById("loginOverlay").classList.add("hidden");
      }
    };

    // 📤 TU LÓGICA ORIGINAL (SIN CAMBIOS)
    const form = document.getElementById("formulario");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const mensaje = document.getElementById("mensaje");
      mensaje.innerHTML = "";

      const formData = new FormData(form);

      try {
        const response = await fetch("https://n8n.openip.cl/webhook/empresa", {
          method: "POST",
          body: formData
        });

        if (response.ok) {
          mensaje.innerHTML = "<p class='success'>Enviado correctamente 🚀</p>";
          form.reset();
        } else {
          mensaje.innerHTML = "<p class='error'>Error al enviar</p>";
        }
      } catch (error) {
        mensaje.innerHTML = "<p class='error'>Error de conexión</p>";
      }
    });
  </script>

</body>
</html>

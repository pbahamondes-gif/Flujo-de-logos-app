<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Registro Empresa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fuente bonita -->

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
      color: #333;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      font-size: 14px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
    }

    .file-input {
      border: 2px dashed #ccc;
      padding: 15px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .file-input:hover {
      border-color: #6366f1;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #6366f1;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4f46e5;
    }

    .success {
      text-align: center;
      color: green;
      margin-top: 10px;
    }

    .error {
      text-align: center;
      color: red;
      margin-top: 10px;
    }
  </style>

</head>
<body>

  <div class="container">
    <h1>Registrar Empresa</h1>

```
<form id="formulario">
  <div class="input-group">
    <label>País</label>
    <input type="text" name="pais" required />
  </div>

  <div class="input-group">
    <label>ID Empresa</label>
    <input type="text" name="empresa_id" required />
  </div>

  <div class="input-group">
    <label>Nombre Empresa</label>
    <input type="text" name="empresa_nombre" required />
  </div>

  <div class="input-group">
    <label>Logo (PNG)</label>
    <input type="file" name="logo" accept="image/png" required />
  </div>

  <button type="submit">Enviar</button>

  <div id="mensaje"></div>
</form>
```

  </div>

  <script>
    const form = document.getElementById("formulario");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const mensaje = document.getElementById("mensaje");
      mensaje.innerHTML = "";

      const formData = new FormData(form);

      try {
        const response = await fetch("https://TU-N8N/webhook/empresa", {
          method: "POST",
          body: formData
        });

        if (response.ok) {
          mensaje.innerHTML = "<p class='success'>Enviado correctamente 🚀</p>";
          form.reset();
        } else {
          mensaje.innerHTML = "<p class='error'>Error al enviar</p>";
        }
      } catch (error) {
        mensaje.innerHTML = "<p class='error'>Error de conexión</p>";
      }
    });
  </script>

</body>
</html>
